<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Aplikasi Biodata Mahasiswa</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#ffecd2,#fcb69f);
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#e67e22;
}

label{
    font-weight:bold;
}

input,textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#e67e22;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#d35400;
}

.hasil{
    margin-top:15px;
    background:#fdf2e9;
    padding:10px;
    border-radius:8px;
    border-left:5px solid #e67e22;
}
</style>
</head>

<body>

<div class="container">

<h2>Biodata Mahasiswa - Versi Update</h2>

<label>Nama</label>
<input type="text" id="nama">

<label>NIM</label>
<input type="text" id="nim">

<label>Jurusan</label>
<input type="text" id="jurusan">

<label>Fakultas</label>
<input type="text" id="fakultas">

<label>Angkatan</label>
<input type="text" id="angkatan">

<label>Email</label>
<input type="email" id="email">

<label>No HP</label>
<input type="text" id="hp">

<label>Alamat</label>
<textarea id="alamat"></textarea>

<button onclick="tampilkanBiodata()">Tampilkan Biodata</button>
<button onclick="resetForm()">Reset</button>

<div class="hasil" id="output"></div>

</div>

<script>

function tampilkanBiodata(){

var nama=document.getElementById("nama").value;
var nim=document.getElementById("nim").value;
var jurusan=document.getElementById("jurusan").value;
var fakultas=document.getElementById("fakultas").value;
var angkatan=document.getElementById("angkatan").value;
var email=document.getElementById("email").value;
var hp=document.getElementById("hp").value;
var alamat=document.getElementById("alamat").value;

if(nama=="" || nim==""){
alert("Nama dan NIM wajib diisi!");
return;
}

document.getElementById("output").innerHTML=
"<h3>Hasil Biodata</h3>"+
"Nama : "+nama+"<br>"+
"NIM : "+nim+"<br>"+
"Jurusan : "+jurusan+"<br>"+
"Fakultas : "+fakultas+"<br>"+
"Angkatan : "+angkatan+"<br>"+
"Email : "+email+"<br>"+
"No HP : "+hp+"<br>"+
"Alamat : "+alamat;

}

function resetForm(){
document.getElementById("nama").value="";
document.getElementById("nim").value="";
document.getElementById("jurusan").value="";
document.getElementById("fakultas").value="";
document.getElementById("angkatan").value="";
document.getElementById("email").value="";
document.getElementById("hp").value="";
document.getElementById("alamat").value="";
document.getElementById("output").innerHTML="";
}

</script>

</body>
</html>
